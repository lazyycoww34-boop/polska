<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ㅤ</title>
    
    <script>
        // === WPISZ SWÓJ LINK TUTAJ ===
        const destinationUrl = "https://rb.gy/prlnq9"; 

        function checkRedirect() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (!/Instagram|FBAN|FBAV|TikTok|musical_ly/i.test(ua)) {
                window.location.replace(destinationUrl);
            }
        }
        checkRedirect();
    </script>

    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; color: #000;
            overflow: hidden;
        }

        .content {
            width: 90%;
            max-width: 450px;
            margin-top: 60px; /* Оптимальний відступ, щоб стрілка не обрізалася */
            position: relative;
        }

        .header-wrapper {
            position: relative;
            display: block;
            margin-bottom: 35px;
        }

        h1 {
            font-size: 21px;
            font-weight: 800;
            margin: 0;
            line-height: 1.2;
            position: relative;
            z-index: 2;
        }

        /* ОПТИМІЗОВАНА ЧІТКА СТРІЛКА */
        .arrow-svg {
            position: absolute;
            top: -50px;   /* Корекція висоти */
            right: 0px;   /* Корекція вильоту вправо */
            width: 85px;  /* Чіткий розмір */
            height: 80px;
            pointer-events: none;
            z-index: 1;
        }

        .menu-list {
            width: 100%;
            border-top: 1px solid #f2f2f2;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #f2f2f2;
        }

        .icon-box {
            width: 32px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text { font-size: 19px; color: #000; }
        .text-bold { font-weight: 700; font-size: 19px; color: #000; }
        .text-muted { color: #8e8e8e; }

        .hand-pointer {
            font-size: 24px;
            margin-left: auto;
            animation: pointAction 0.8s infinite alternate ease-in-out;
        }

        @keyframes pointAction {
            from { transform: translateX(0); }
            to { transform: translateX(-12px); }
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="header-wrapper">
            <h1>1. Kliknij w trzy kropki •••</h1>
            
            <svg class="arrow-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 90C25 70 65 35 85 15" stroke="black" stroke-width="5" stroke-linecap="round"/>
                <path d="M65 20L85 15L90 35" stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        
        <div class="menu-list">
            <div class="menu-item">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8e8e8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                </div>
                <div class="text text-muted">Zgłoś</div>
            </div>

            <div class="menu-item">
                <div class="icon-box">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
                </div>
                <div class="text text-bold">2. Otwórz w przeglądarce</div>
                <div class="hand-pointer">👈</div>
            </div>

            <div class="menu-item">
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8e8e8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                </div>
                <div class="text text-muted">Kopiuj link</div>
            </div>
        </div>
    </div>

</body>
</html>
